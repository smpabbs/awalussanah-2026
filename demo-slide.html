<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo 3D Transisi — Awalussanah 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#080b12;color:#e0e0e0;overflow:hidden;height:100vh}

/* ── NAV BAR ── */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(8,11,18,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(200,164,92,.1);
  padding:.6rem 1rem;display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;
}
.top-bar button{
  background:transparent;border:1px solid rgba(255,255,255,.08);
  color:#666;font-size:.72rem;font-weight:600;padding:.35rem .8rem;
  border-radius:16px;cursor:pointer;transition:all .3s;font-family:inherit;
}
.top-bar button:hover{color:#aaa;border-color:rgba(255,255,255,.15)}
.top-bar button.active{color:#c8a45c;border-color:rgba(200,164,92,.3);background:rgba(200,164,92,.08)}

/* ── 3D STAGE ── */
.stage{
  position:fixed;top:0;left:0;width:100%;height:100%;
  perspective:1200px;
}
.cube{
  position:absolute;top:0;left:0;width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .8s cubic-bezier(.4,.0,.2,1);
}
.face{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:5rem 2rem 4rem;backface-visibility:hidden;
  overflow:hidden;
}
/* face lighting overlay */
.face::before{
  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  transition:opacity .8s;
}

/* ── NAV ARROWS ── */
.nav-arrow{
  position:fixed;top:50%;z-index:50;
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:#888;font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;backdrop-filter:blur(8px);
}
.nav-arrow:hover{background:rgba(200,164,92,.1);border-color:rgba(200,164,92,.3);color:#c8a45c}
.nav-arrow.prev{left:1rem;transform:translateY(-50%)}
.nav-arrow.next{right:1rem;transform:translateY(-50%)}

/* ── DOTS ── */
.dots{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:.5rem}
.dots span{
  width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);
  cursor:pointer;transition:all .3s;
}
.dots span.active{background:#c8a45c;box-shadow:0 0 8px rgba(200,164,92,.4)}

/* ── SLIDE COUNTER ── */
.counter{
  position:fixed;top:.7rem;right:1.2rem;z-index:50;
  font-size:.7rem;color:#555;font-weight:600;letter-spacing:1px;
}

/* ── KEYBOARD HINT ── */
.hint{
  position:fixed;bottom:1.2rem;right:1.2rem;z-index:50;
  font-size:.6rem;color:#444;letter-spacing:.5px;
}

/* ── CONTENT CARDS ── */
.slide-label{
  font-size:.6rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;
  color:rgba(200,164,92,.4);margin-bottom:.8rem;
}
.slide-title{font-size:clamp(1.6rem,4vw,2.8rem);font-weight:800;color:#c8a45c;text-align:center;margin-bottom:.4rem}
.slide-sub{font-size:.9rem;color:#888;text-align:center;max-width:500px;line-height:1.7}
.slide-card{
  margin-top:1.5rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:16px;padding:1.2rem 2rem;text-align:center;backdrop-filter:blur(10px);
  max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.slide-card h3{color:#2dd4bf;font-size:1rem;margin-bottom:.3rem}
.slide-card span{color:#666;font-size:.8rem}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar" id="topBar">
  <button class="active" data-mode="cube3d">Cube 3D Realistis</button>
  <button data-mode="cubeLit">Cube + Lampu</button>
  <button data-mode="hexagon">Hexagon 3D</button>
  <button data-mode="portal">Portal Warp</button>
  <button data-mode="carousel3d">Carousel 3D</button>
  <button data-mode="room">Room Walk</button>
</div>

<!-- 3D STAGE -->
<div class="stage" id="stage">
  <div class="cube" id="cube"></div>
</div>

<!-- NAV -->
<button class="nav-arrow prev" id="prevBtn">◀</button>
<button class="nav-arrow next" id="nextBtn">▶</button>
<div class="dots" id="dots"></div>
<div class="counter" id="counter"></div>
<div class="hint">← → Arrow keys</div>

<script>
const SLIDES=[
  {emoji:'🏠',title:'Home',sub:'Selamat datang di Awalussanah 2026/2027',bg:'linear-gradient(135deg,#0a0e17 0%,#111827 100%)'},
  {emoji:'📚',title:'Kurikulum',sub:'Sinergi Kurmer + ICT + TCP',bg:'linear-gradient(135deg,#0a0e17 0%,#0d1520 100%)'},
  {emoji:'💻',title:'ICT Class',sub:'Fondasi · Elektronika · Web Dev',bg:'linear-gradient(135deg,#080c14 0%,#0a1a1a 100%)'},
  {emoji:'📖',title:'Tahfidz',sub:'Target 10 Juz — Tahfidz Class Program',bg:'linear-gradient(135deg,#0a0e17 0%,#14100a 100%)'},
  {emoji:'📅',title:'Timeline',sub:'6 Tahapan Matrikulasi',bg:'linear-gradient(135deg,#0a0e17 0%,#0f0a1a 100%)'},
  {emoji:'🔍',title:'Cari Kelas',sub:'⚠️ Kelas Sementara — after MPLS',bg:'linear-gradient(135deg,#0a0e17 0%,#0a1218 100%)'}
];
let current=0, mode='cube3d', transitioning=false;

const cube=document.getElementById('cube');
const dots=document.getElementById('dots');
const counter=document.getElementById('counter');

/* ── BUILD SLIDES ── */
function buildSlides(){
  cube.innerHTML='';
  SLIDES.forEach((s,i)=>{
    const face=document.createElement('div');
    face.className='face';
    face.style.background=s.bg;
    face.innerHTML=`
      <div class="slide-label">Slide ${i+1}</div>
      <div class="slide-title">${s.emoji} ${s.title}</div>
      <div class="slide-sub">${s.sub}</div>
      <div class="slide-card"><h3>${s.emoji} ${s.title}</h3><span>SMP ABBS Surakarta</span></div>
    `;
    cube.appendChild(face);
  });
}

/* ── BUILD DOTS ── */
function buildDots(){
  dots.innerHTML='';
  SLIDES.forEach((_,i)=>{
    const d=document.createElement('span');
    if(i===0)d.classList.add('active');
    d.onclick=()=>goTo(i);
    dots.appendChild(d);
  });
}

/* ── APPLY TRANSFORM ── */
function applyTransform(){
  const faces=cube.querySelectorAll('.face');
  const n=SLIDES.length;

  // reset
  cube.style.transition='transform .8s cubic-bezier(.4,.0,.2,1)';
  cube.style.transformStyle='preserve-3d';
  document.getElementById('stage').style.perspective='1200px';

  faces.forEach(f=>{f.style.backfaceVisibility='hidden';f.style.position='absolute'});

  switch(mode){
    case 'cube3d':{
      // Realistic 3D cube: 4 visible faces at a time
      const angle=current*90;
      cube.style.transform=`translateZ(-50vh) rotateY(${-angle}deg)`;
      const faceSize='100%';
      faces.forEach((f,i)=>{
        f.style.width='100%';f.style.height='100%';
        const ry=i*90;
        f.style.transform=`rotateY(${ry}deg) translateZ(50vh)`;
        // lighting
        const rel=((ry-angle)%360+360)%360;
        const brightness=rel===0?1:rel===90?.7:rel===180?.4:rel===270?.6:.5;
        f.style.filter=`brightness(${brightness})`;
        f.style.opacity=rel<=90||rel>=270?1:rel===180?.3:.6;
      });
      break;
    }
    case 'cubeLit':{
      // Cube with dynamic lighting + reflection
      const angle=current*90;
      cube.style.transform=`translateZ(-50vh) rotateY(${-angle}deg)`;
      faces.forEach((f,i)=>{
        f.style.width='100%';f.style.height='100%';
        const ry=i*90;
        f.style.transform=`rotateY(${ry}deg) translateZ(50vh)`;
        const rel=((ry-angle)%360+360)%360;
        // dynamic lighting
        const light=rel===0?1:rel===90?.65:rel===180?.3:rel===270?.55:.5;
        const saturation=rel===0?1:.7;
        f.style.filter=`brightness(${light}) saturate(${saturation})`;
        f.style.opacity=rel<=90||rel>=270?1:.25;
        // reflection overlay
        f.style.setProperty('--light',light);
      });
      // add reflection line on stage
      document.getElementById('stage').style.boxShadow='inset 0 -200px 300px -150px rgba(200,164,92,.03)';
      break;
    }
    case 'hexagon':{
      // Hexagonal prism
      const angle=current*60;
      cube.style.transform=`translateZ(-40vh) rotateY(${-angle}deg)`;
      faces.forEach((f,i)=>{
        f.style.width='100%';f.style.height='100%';
        const ry=i*60;
        f.style.transform=`rotateY(${ry}deg) translateZ(40vh)`;
        const rel=((ry-angle)%360+360)%360;
        const light=rel===0?1:rel===60?.8:rel===120?.5:rel===180?.3:rel===240?.5:rel===300?.8:.5;
        f.style.filter=`brightness(${light})`;
        f.style.opacity=rel<=120||rel>=240?1:.2;
      });
      break;
    }
    case 'portal':{
      // Zoom portal warp
      faces.forEach((f,i)=>{
        f.style.width='100%';f.style.height='100%';
        if(i===current){
          f.style.transform='scale(1)';
          f.style.opacity='1';f.style.filter='brightness(1)';
          f.style.zIndex='2';
        }else if(i===((current-1+n)%n)){
          f.style.transform='scale(3) translateZ(-200px)';
          f.style.opacity='0';f.style.filter='brightness(2)';
          f.style.zIndex='1';
        }else{
          f.style.transform='scale(.1) translateZ(500px)';
          f.style.opacity='0';f.style.filter='brightness(0)';
          f.style.zIndex='0';
        }
      });
      cube.style.transform='none';
      cube.style.transition='transform .6s';
      break;
    }
    case 'carousel3d':{
      // 3D carousel — all faces visible in circle
      const angle=current*(360/n);
      const radius=Math.round(50/Math.tan(Math.PI/n));
      cube.style.transform=`rotateY(${-angle}deg)`;
      document.getElementById('stage').style.perspective='none';
      faces.forEach((f,i)=>{
        f.style.width='100%';f.style.height='100%';
        const ry=i*(360/n);
        f.style.transform=`rotateY(${ry}deg) translateZ(${radius}vh)`;
        const rel=((ry-angle)%360+360)%360;
        const light=rel===0?1:rel<=120||rel>=240?.6:.3;
        f.style.filter=`brightness(${light})`;
        f.style.opacity=rel<=90||rel>=270?1:.15;
      });
      break;
    }
    case 'room':{
      // Room walk — forward/back through rooms
      const offset=-current*100;
      cube.style.transform=`translateZ(0)`;
      faces.forEach((f,i)=>{
        f.style.width='100%';f.style.height='100%';
        const z=(i-current)*100;
        f.style.transform=`translateZ(${-z}vh)`;
        const dist=Math.abs(z);
        const light=Math.max(.2,1-dist*.15);
        const blur=Math.min(dist*.5,4);
        f.style.filter=`brightness(${light}) blur(${blur}px)`;
        f.style.opacity=dist>200?0:Math.max(0,1-dist*.005);
        f.style.zIndex=100-Math.abs(i-current)*10;
      });
      break;
    }
  }

  // update dots
  dots.querySelectorAll('span').forEach((d,i)=>d.classList.toggle('active',i===current));
  counter.textContent=`${current+1} / ${SLIDES.length}`;
}

/* ── NAVIGATE ── */
function goTo(i){
  if(transitioning||i===current)return;
  transitioning=true;
  current=i;
  applyTransform();
  setTimeout(()=>transitioning=false,850);
}
function next(){goTo((current+1)%SLIDES.length)}
function prev(){goTo((current-1+SLIDES.length)%SLIDES.length)}

document.getElementById('nextBtn').onclick=next;
document.getElementById('prevBtn').onclick=prev;
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')next();
  if(e.key==='ArrowLeft')prev();
});

/* ── MODE SWITCHER ── */
document.querySelectorAll('.top-bar button').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.top-bar button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    mode=btn.dataset.mode;
    applyTransform();
  };
});

/* ── INIT ── */
buildSlides();
buildDots();
applyTransform();
</script>
</body>
</html>
