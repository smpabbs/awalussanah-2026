<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mockup 1 — Modern Premium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;font-family:system-ui,-apple-system,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:2rem}
.card{
  background:#131a2b;border-radius:20px;border:1px solid rgba(212,168,67,.15);
  max-width:580px;width:100%;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.4)
}
.banner{
  background:linear-gradient(135deg,#1a2340,#0a0e17);
  padding:1.8rem 2rem;text-align:center;
  border-bottom:1px solid rgba(212,168,67,.1)
}
.banner .big{font-size:1.6rem;margin-bottom:.3rem}
.banner h1{font-size:1.1rem;color:#c8a45c;font-weight:600}
.banner p{font-size:.75rem;color:rgba(255,255,255,.5);margin-top:.2rem}
.body-card{padding:2rem 2rem 1.5rem}
.avatar-wrap{text-align:center;margin-bottom:1rem}
.avatar{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,#c8a45c,#8b6f3a);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:1.5rem;font-weight:700;color:#0a0e17;
  box-shadow:0 4px 15px rgba(200,164,92,.3)
}
.info{text-align:center;margin-bottom:1.2rem}
.info .nama{font-size:1.15rem;font-weight:600;color:#e8e8e8}
.info .asal{font-size:.8rem;color:rgba(255,255,255,.45);margin-top:.2rem}
.info .kelas{
  display:inline-block;margin-top:.6rem;
  background:rgba(200,164,92,.12);color:#c8a45c;
  padding:.25rem .9rem;border-radius:20px;font-size:.75rem;font-weight:500
}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin:.8rem 0}
.walas{display:flex;align-items:center;gap:.9rem;padding:.7rem;background:rgba(255,255,255,.03);border-radius:12px}
.walas .foto{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#2dd4bf,#1a7a6a);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:.8rem;color:#fff;font-weight:600
}
.walas .txt{flex:1}
.walas .txt .lbl{font-size:.6rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.05em}
.walas .txt .nm{font-size:.85rem;font-weight:500;color:#ddd}
.walas .txt .wa{font-size:.65rem;color:rgba(255,255,255,.4)}
.btns{display:flex;gap:.6rem;margin-top:.9rem}
.btns .btn-chat,.btns .btn-grup{
  flex:1;display:flex;align-items:center;justify-content:center;gap:.4rem;
  padding:.65rem;border-radius:10px;font-size:.78rem;font-weight:500;text-decoration:none
}
.btns .btn-chat{background:#25d366;color:#0a0e17}
.btns .btn-grup{background:rgba(255,255,255,.06);color:#ccc;border:1px solid rgba(255,255,255,.08)}
.qr-section{text-align:center;margin-top:.8rem;padding:.6rem}
.qr-section img{width:100px;height:100px;border-radius:8px;border:1px solid rgba(255,255,255,.06)}
.qr-section .lbl{font-size:.6rem;color:rgba(255,255,255,.35);margin-top:.3rem}
</style>
</head>
<body>
<div class="card">
  <div class="banner">
    <div class="big">🎉</div>
    <h1>Barakallah! Kamu masuk ke 7 Putri B</h1>
    <p>Pembagian kelas ini bersifat sementara</p>
  </div>
  <div class="body-card">
    <div class="avatar-wrap"><div class="avatar">AA</div></div>
    <div class="info">
      <div class="nama">Alisya Anindita Nurviola</div>
      <div class="asal">SDI Al Abidin Surakarta</div>
      <div class="kelas">🎯 7 Putri B</div>
    </div>
    <div class="divider"></div>
    <div class="walas">
      <div class="foto">CN</div>
      <div class="txt">
        <div class="lbl">Wali Kelas</div>
        <div class="nm">Charlieta Nova Putri Fedito, S.Kom</div>
        <div class="wa">📞 62895346711831</div>
      </div>
    </div>
    <div class="btns">
      <a class="btn-chat" href="#">💬 Chat Wali Kelas</a>
      <a class="btn-grup" href="#">👥 Grup WA</a>
    </div>
    <div class="qr-section">
      <div style="width:100px;height:100px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:linear-gradient(135deg,#1a2340,#0a0e17);margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#c8a45c">⬛</div>
      <div class="lbl">Scan untuk join Grup WA</div>
    </div>
  </div>
</div>
</body>
</html>
