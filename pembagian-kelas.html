*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#111827;--gold:#c8a45c;--teal:#2dd4bf;--text:#e0e0e0;--muted:#777;--border:rgba(255,255,255,.06)}

/* Nav */
.topbar{position:sticky;top:0;z-index:10;background:rgba(10,14,23,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:.8rem 2rem;display:flex;align-items:center;justify-content:space-between}
.topbar .logo{font-size:1rem;font-weight:700;color:var(--gold)}
.topbar .subtitle{font-size:.75rem;color:var(--muted)}
.stats{display:flex;gap:1rem;align-items:center}
.stat{text-align:center}
.stat .num{font-size:1.4rem;font-weight:800;color:var(--gold)}
.stat .lbl{font-size:.65rem;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}

/* Tab navigation */
.tabs{display:flex;gap:.5rem;padding:1rem 2rem;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{height:3px}
.tabs::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
.tab{padding:.5rem 1rem;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .3s;white-space:nowrap;border:1px solid transparent;color:var(--muted)}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab.active{color:var(--gold);background:rgba(200,164,92,.08);border-color:rgba(200,164,92,.2)}
.tab .badge{display:inline-block;margin-left:.4rem;padding:.1rem .4rem;border-radius:10px;font-size:.65rem;font-weight:700;background:rgba(200,164,92,.15);color:var(--gold)}

/* Content */
.content{max-width:1000px;margin:0 auto;padding:1.5rem 2rem}

/* Class header */
.class-header{background:linear-gradient(135deg,rgba(200,164,92,.08),rgba(45,212,191,.05));border:1px solid rgba(200,164,92,.15);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem}
.class-header h2{font-size:1.3rem;font-weight:800;color:var(--gold);margin-bottom:.3rem}
.class-header .walas{font-size:.85rem;color:var(--muted)}
.class-header .walas strong{color:var(--teal)}
.class-header .counts{display:flex;gap:1rem;margin-top:.8rem}
.count-badge{padding:.3rem .8rem;border-radius:20px;font-size:.75rem;font-weight:600}
.count-badge.laki{background:rgba(45,212,191,.1);color:var(--teal);border:1px solid rgba(45,212,191,.2)}
.count-badge.perempuan{background:rgba(200,164,92,.1);color:var(--gold);border:1px solid rgba(200,164,92,.2)}
.count-badge.total{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--border)}

/* Table */
.table-wrap{border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:rgba(200,164,92,.08)}
th{padding:.7rem 1rem;text-align:left;font-size:.7rem;font-weight:700;color:var(--gold);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:.6rem 1rem;font-size:.82rem;border-bottom:1px solid var(--border);transition:background .2s}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.no{color:var(--muted);font-weight:600;width:40px}
.nama{font-weight:600}
.gender{width:80px;text-align:center}
.gender.laki{color:var(--teal)}
.gender.perempuan{color:var(--gold)}
.asal{color:var(--muted);font-size:.78rem}
.wa-cell{width:140px}
.wa-cell input{width:100%;padding:.3rem .5rem;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);font-size:.78rem;font-family:inherit;transition:border-color .2s}
.wa-cell input:focus{outline:none;border-color:var(--gold)}
.wa-cell input::placeholder{color:#444}

/* Print */
@media print{
  body{background:#fff;color:#000}
  .topbar,.tabs,.wa-cell input{display:none!important}
  .class-header{background:#f5f5f5;border-color:#ddd}
  .class-header h2{color:#333}
  .class-header .walas{color:#666}
  .table-wrap{border-color:#ddd}
  th{background:#f0f0f0;color:#333}
  td{color:#333;border-color:#ddd}
}

/* Responsive */
@media(max-width:768px){
  .topbar{padding:.6rem 1rem;flex-direction:column;gap:.5rem}
  .tabs{padding:.5rem 1rem}
  .content{padding:1rem}
  .class-header{padding:1rem}
  table{font-size:.75rem}
  th,td{padding:.5rem .6rem}
  .asal{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
}

/* All classes view */
.all-classes{display:none}
.all-classes.show{display:block}
</style>

kelasOrder.forEach(k => byKelas[k] = []);
DATA.forEach(s => {
  if (byKelas[s.kelas]) byKelas[s.kelas].push(s);
});
kelasOrder.forEach(k => byKelas[k].sort((a,b) => a.n.localeCompare(b.n)));

// Stats
let tL = 0, tP = 0;
DATA.forEach(s => s.g === 'L' ? tL++ : tP++);
document.getElementById('totalL').textContent = tL;
document.getElementById('totalP').textContent = tP;

// Tabs
const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');
let activeTab = 'all';

function renderTabs() {
  tabsEl.innerHTML = '';
  // All tab
  const allTab = document.createElement('div');
  allTab.className = 'tab' + (activeTab === 'all' ? ' active' : '');
  allTab.innerHTML = '📋 Semua Kelas <span class="badge">' + DATA.length + '</span>';
  allTab.onclick = () => switchTab('all');
  tabsEl.appendChild(allTab);

  kelasOrder.forEach(k => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (activeTab === k ? ' active' : '');
    const short = k.replace('7 ', '7 ');
    tab.innerHTML = short + ' <span class="badge">' + byKelas[k].length + '</span>';
    tab.onclick = () => switchTab(k);
    tabsEl.appendChild(tab);
  });
}

function renderTable(kelas, list) {
  const isPutri = kelas.includes('Putri');
  let lCount = list.filter(s => s.g === 'L').length;
  let pCount = list.filter(s => s.g === 'P').length;

  let html = '<div class="class-header">';
  html += '<h2>' + kelas + '</h2>';
  html += '<div class="walas">Wali Kelas: <strong>' + (WALAS[kelas] || '-') + '</strong></div>';
  html += '<div class="counts">';
  html += '<span class="count-badge laki">♂ ' + lCount + ' Laki-laki</span>';
  html += '<span class="count-badge perempuan">♀ ' + pCount + ' Perempuan</span>';
  html += '<span class="count-badge total">Total: ' + list.length + ' Siswa</span>';
  html += '</div></div>';

  html += '<div class="table-wrap"><table>';
  html += '<thead><tr><th>No</th><th>Nama Siswa</th><th style="text-align:center">JK</th><th>Asal Sekolah</th><th>No. WA</th></tr></thead>';
  html += '<tbody>';
  list.forEach((s, i) => {
    html += '<tr>';
    html += '<td class="no">' + (i+1) + '</td>';
    html += '<td class="nama">' + s.n + '</td>';
    html += '<td class="gender ' + (s.g === 'L' ? 'laki' : 'perempuan') + '">' + (s.g === 'L' ? '♂ L' : '♀ P') + '</td>';
    html += '<td class="asal">' + s.s + '</td>';
    html += '<td class="wa-cell"><input type="tel" placeholder="08xxx..." data-nama="' + s.n.replace(/"/g, '&quot;') + '"></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function renderAll() {
  let html = '';
  kelasOrder.forEach(k => {
    html += renderTable(k, byKelas[k]);
  });
  contentEl.innerHTML = html;
}

function renderOne(kelas) {
  contentEl.innerHTML = renderTable(kelas, byKelas[kelas]);
}

function switchTab(tab) {
  activeTab = tab;
  renderTabs();
  if (tab === 'all') renderAll(); else renderOne(tab);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const idx = kelasOrder.indexOf(activeTab);
  if (e.key === 'ArrowRight' && idx < kelasOrder.length - 1) switchTab(kelasOrder[idx + 1]);
  if (e.key === 'ArrowLeft' && idx > 0) switchTab(kelasOrder[idx - 1]);
  if (e.key === 'Escape') switchTab('all');
});

// Init
renderTabs();
renderAll();
</script>
</body>
</html>
